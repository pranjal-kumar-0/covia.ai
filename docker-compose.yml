version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_recruiter_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: recruiter_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: